<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.createElement('div');
      d.style = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#1a0000;color:#ff6b6b;padding:24px;font-family:monospace;font-size:13px;z-index:999999;overflow:auto;word-break:break-word;white-space:pre-wrap;';
      d.innerHTML = '<b>Error:</b> ' + msg + '\nSource: ' + src + '\nLine: ' + line + ', Col: ' + col + (err ? '\n\n' + err.stack : '');
      document.body ? document.body.appendChild(d) : document.addEventListener('DOMContentLoaded', function(){ document.body.appendChild(d); });
      return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
      window.onerror(String(e.reason), 'promise', 0, 0, e.reason instanceof Error ? e.reason : null);
    });
  </script>

<title>Dream Board Mobile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* Collapsible menu sections */
.msec-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:13px 18px 5px;cursor:pointer;font-family:inherit;text-align:left}
.msec-toggle:focus-visible{outline:3px solid var(--ac3);outline-offset:-2px}
.msec-toggle-ic{font-size:12px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.msec-toggle-ic.open{transform:rotate(90deg)}
.msec-body{overflow:hidden;transition:max-height .22s ease}
.msec-body.closed{max-height:0!important}
/* Skip to content for keyboard/switch/Braille users */
.skip-link{position:absolute;top:-999px;left:16px;background:var(--ac);color:#fff;padding:8px 14px;border-radius:0 0 8px 8px;font-weight:700;font-size:14px;z-index:9999;text-decoration:none;font-family:inherit}
.skip-link:focus{top:0}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07050f;--sf:#100d1e;--sf2:#161228;--sf3:#1d1730;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --ac:#6d28d9;--ac2:#9333ea;--ac3:#c084fc;--ac4:#e9d5ff;
  --gr:#34d399;--rd:#f87171;
  --tx:#ede9fe;--tx2:#9d85c0;--tx3:#574d78;
  --fs:14px;--btn-h:44px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:var(--fs);-webkit-font-smoothing:antialiased}
:focus-visible{outline:3px solid var(--ac3);outline-offset:2px;border-radius:4px}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:3px solid var(--ac3);outline-offset:2px}
.bi:focus-visible{outline:3px solid var(--ac3);outline-offset:3px;border-radius:50%}
/* RTT/TTY and caption support */
@media(prefers-captions:enabled){.dc-body,.cm-body{font-size:17px!important;line-height:1.8!important}}
/* High-contrast text adjustments */
@media(prefers-contrast:more){.tx2-text,.dc-body,.cm-body,.cpv,.ntm,.snav-sub{color:var(--tx)!important}}
.app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
@media(min-width:640px){.app{max-width:600px;font-size:15px}}
@media(min-width:1024px){.app{max-width:480px}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(forced-colors:active){.nb-check,.cbx{forced-color-adjust:auto}}
@media(prefers-contrast:more){:root{--bd:rgba(255,255,255,.4);--bd2:rgba(255,255,255,.6);--tx2:#fff}}
.pg{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:72px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pg::-webkit-scrollbar{display:none}
/* Nav */
/* ── Tab Bar ── */
.bnav{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:stretch;background:rgba(7,5,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);z-index:100;padding-bottom:env(safe-area-inset-bottom);gap:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--tx3);font-size:10px;font-weight:600;font-family:inherit;padding:10px 0 11px;transition:color .18s;position:relative}
.nb.on{color:var(--tx)}
.nb-check{width:16px;height:16px;border-radius:4px;border:2px solid var(--tx3);display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;margin-bottom:1px}
.nb.on .nb-check{background:var(--ac);border-color:var(--ac)}
.nb.on .nb-check::after{content:'';display:block;width:5px;height:8px;border-right:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(45deg) translate(-1px,-1px)}
.nb-menu{flex:1.2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;font-family:inherit;padding:10px 0 11px;color:var(--tx2);font-size:10px;font-weight:700;position:relative;border-left:1px solid var(--bd)}
.nb-menu:active{background:rgba(255,255,255,.04)}
.nb-menu-ic{display:flex;align-items:center;gap:4px;font-size:13px}
.nb-menu.has-notif::after{content:'';position:absolute;top:9px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:var(--rd);border:2px solid var(--bg)}
/* Cherry subtle header pill */
.cherry-feed-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(109,40,217,.12);border:1px solid rgba(168,85,247,.22);border-radius:100px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--ac3);cursor:pointer;font-family:inherit;transition:background .15s}
.cherry-feed-pill:active{background:rgba(109,40,217,.22)}
/* Header */
.hdr{position:sticky;top:0;background:rgba(7,5,15,.93);backdrop-filter:blur(18px);z-index:10;border-bottom:1px solid var(--bd)}
.htit{font-family:'DM Serif Display',Georgia,serif;font-size:22px;background:linear-gradient(135deg,var(--ac4),var(--ac3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-row{display:flex;align-items:center;gap:6px;padding:48px 14px 12px}
.hdr-title{font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:var(--tx);flex:1}
/* Feed tabs */
.ftabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 8px;gap:2px;border-bottom:1px solid var(--bd)}
.ftabs::-webkit-scrollbar{display:none}
.ftab{background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:var(--tx3);padding:10px 10px 8px;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;display:inline-flex;align-items:baseline;gap:5px;position:relative}
.ftab.on{color:var(--tx);font-weight:700;border-bottom-color:var(--ac2)}
.ftab-count{font-size:10px;font-weight:600;opacity:.55;transition:opacity .15s}
.ftab.on .ftab-count{opacity:.85;color:var(--ac3)}
.ftab-num{font-size:9px;font-weight:700;opacity:.35;letter-spacing:.02em;transition:opacity .15s}
.ftab.on .ftab-num{opacity:.65;color:var(--ac3)}
/* Dream card */
.dc{border-bottom:1px solid var(--bd)}
.dc-inner{padding:12px 14px 0}
.dc-meta{display:flex;align-items:center;gap:4px;overflow:hidden;margin-bottom:5px;white-space:nowrap}
.dc-name{font-size:13px;font-weight:700;color:var(--tx)}
.dc-handle{font-size:12px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;max-width:90px}
.dc-dot{font-size:11px;color:var(--tx3);flex-shrink:0}
.dc-time{font-size:12px;color:var(--tx3);flex-shrink:0}
.dc-domain{font-size:12px;color:var(--ac3);flex-shrink:0}
.dc-body{font-size:var(--fs);line-height:1.6;color:var(--tx);margin-bottom:8px}
.dc-tag{color:var(--ac3);font-weight:500;cursor:pointer}
.rd-source{font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:4px;padding:6px 14px 0}
/* Checkbox interactions */
.ixn-row{display:flex;align-items:stretch;border-top:1px solid var(--bd)}
.ixn-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;color:var(--tx3);font-size:11px;font-weight:500;font-family:inherit;padding:9px 3px;transition:color .15s;min-height:42px}
.ixn-btn:active{background:rgba(255,255,255,.04)}
.ixn-btn.redd{color:var(--gr)}
.ixn-btn.bookd{color:var(--ac3)}
.ixn-btn svg{width:15px;height:15px;flex-shrink:0}
.cbx-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;flex:1;justify-content:center;padding:9px 3px;min-height:42px;font-size:11px;font-weight:500;transition:color .15s;background:none;border:none;font-family:inherit}
.cbx-wrap.liked{color:var(--rd)}
.cbx-wrap.redd{color:var(--gr)}
.cbx-wrap.bookd{color:var(--ac3)}
.cbx-box{width:16px;height:16px;border-radius:4px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:transparent}
.cbx-wrap.liked .cbx-box{background:var(--rd);border-color:var(--rd)}
.cbx-wrap.redd .cbx-box{background:var(--gr);border-color:var(--gr)}
.cbx-wrap.bookd .cbx-box{background:var(--ac);border-color:var(--ac)}
/* Surfaces */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.av{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-family:inherit}
.btn{border:none;border-radius:100px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .18s;display:inline-flex;align-items:center;justify-content:center;gap:5px;min-height:var(--btn-h)}
.bp{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;padding:9px 18px;font-size:14px}
.bp:active{opacity:.82;transform:scale(.97)}
.bp:disabled{opacity:.4;cursor:default;transform:none}
.bgb{background:transparent;border:1px solid var(--bd2);color:var(--tx2);padding:8px 14px;font-size:13px}
.bi{background:none;border:none;cursor:pointer;color:var(--tx2);padding:6px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.bi:active{background:rgba(255,255,255,.08)}
.inp{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;color:var(--tx);font-family:inherit;font-size:16px;outline:none;width:100%;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--ac2)}
.inp::placeholder{color:var(--tx3)}
textarea.inp{resize:none;line-height:1.55}
/* Checkbox toggle (settings) */
.cbx{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.cbx.on{background:var(--ac);border-color:var(--ac)}
/* Tab rows */
.tabrow{display:flex;border-bottom:1px solid var(--bd)}
.tb{flex:1;background:none;border:none;padding:11px 0;font-size:12px;font-family:inherit;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s;white-space:nowrap}
.tb.on{color:var(--ac3);border-bottom-color:var(--ac2)}
.tbdg{display:inline-flex;align-items:center;justify-content:center;background:rgba(248,113,113,.2);color:var(--rd);border-radius:100px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:4px;min-width:14px}
/* Overlay */
.ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;animation:fi .18s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.msh{background:var(--sf);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;scrollbar-width:none;border-top:1px solid var(--bd2);animation:su .24s cubic-bezier(.32,.72,0,1)}
.msh::-webkit-scrollbar{display:none}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhd{width:32px;height:4px;background:var(--bd2);border-radius:2px;margin:11px auto 0}
.min{padding:13px 17px 40px}
.mtt{font-family:'DM Serif Display',Georgia,serif;font-size:20px;margin-bottom:3px}
.msb{font-size:12px;color:var(--tx3);margin-bottom:16px}
.osb{display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;cursor:pointer;color:var(--tx2);padding:13px 0;font-size:14px;font-family:inherit;border-bottom:1px solid var(--bd);text-align:left}
.osb:last-child{border-bottom:none}
.osb:active{color:var(--tx)}
.osb-red{color:var(--rd)!important}
/* Comment view */
.cm-item{padding:12px 16px;border-bottom:1px solid var(--bd)}
.cm-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.cm-body{font-size:13px;color:var(--tx);line-height:1.55;margin-bottom:6px}
.cm-actions{display:flex;align-items:center;gap:14px}
.cm-act{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--tx3);font-size:11px;font-family:inherit;padding:0;transition:color .15s}
.cm-act.on{color:var(--rd)}
.cm-cbx{width:14px;height:14px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cm-act.on .cm-cbx{background:var(--rd);border-color:var(--rd)}
.sort-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--bd)}
.sort-lbl{font-size:12px;color:var(--tx3);font-weight:600}
.sort-btn{display:flex;align-items:center;gap:4px;background:var(--sf2);border:1px solid var(--bd2);border-radius:100px;padding:5px 11px;font-size:11px;color:var(--tx2);cursor:pointer;font-family:inherit;font-weight:500}
/* Profile */
.pcov{height:100px;background:linear-gradient(135deg,#12063a,#26095e,#07123a);position:relative}
.pbdy{padding:38px 16px 12px}
.pnm{font-family:'DM Serif Display',Georgia,serif;font-size:20px;margin-bottom:2px}
.phdl{font-size:13px;color:var(--tx3);margin-bottom:7px}
.pbio{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:9px}
.pmr{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.pmi{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--tx3)}
.psr{display:flex;gap:0;padding-top:10px;border-top:1px solid var(--bd)}
.pstat{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;border-radius:10px;transition:background .15s}
.pstat:active{background:rgba(255,255,255,.04)}
.pstat .stv{font-size:16px;font-weight:700}
.pstat .stl{font-size:10px;color:var(--tx3);margin-top:1px;text-align:center}
/* Tab filter bar */
.tab-filter-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--bd)}
.tab-count{font-size:12px;color:var(--tx3)}
.tab-count strong{color:var(--tx);font-size:14px}
/* Messaging */
.ci{display:flex;align-items:center;gap:11px;padding:12px 16px;cursor:pointer}
.ci:active{background:rgba(255,255,255,.02)}
.cif{flex:1;min-width:0}
.cnm{font-size:14px;font-weight:700}
.cpv{font-size:12px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.ucnt{background:var(--ac2);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.msgs::-webkit-scrollbar{display:none}
.mr{display:flex;gap:6px;align-items:flex-end}
.mr.me{flex-direction:row-reverse}
.bub{max-width:76%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.bub.th{background:var(--sf2);color:var(--tx);border-bottom-left-radius:4px}
.bub.me{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-bottom-right-radius:4px}
.cir{display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--bd);align-items:center}
/* Notifications */
.ni{display:flex;align-items:flex-start;gap:11px;padding:11px 16px;cursor:pointer}
.ni.unr{background:rgba(109,40,217,.04)}
.ntx{font-size:13px;color:var(--tx2);line-height:1.5;flex:1}
.ntx strong{color:var(--tx)}
.ntm{font-size:10px;color:var(--tx3);margin-top:3px}
.npv{font-size:11px;color:var(--tx3);margin-top:3px;padding:5px 8px;background:var(--sf2);border-radius:7px;border-left:2px solid var(--ac2)}
/* Groups */
.gbr{height:64px;display:flex;align-items:center;justify-content:center;font-size:28px}
.gin{padding:11px 13px 13px}
.gnm{font-size:15px;font-weight:700;margin-bottom:2px}
.gmt{font-size:12px;color:var(--tx3);margin-bottom:6px}
/* Cherry AI */
.aiorb{border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac3));display:flex;align-items:center;justify-content:center;animation:aip 3s ease-in-out infinite}
@keyframes aip{0%,100%{box-shadow:0 0 28px rgba(109,40,217,.45)}50%{box-shadow:0 0 52px rgba(147,51,234,.7)}}
.aisc{background:var(--sf2);border:1px solid var(--bd2);border-radius:100px;padding:6px 12px;font-size:12px;color:var(--tx2);cursor:pointer;white-space:nowrap;font-family:inherit}
/* Misc */
/* .slbl is rendered as <h2> for screen reader heading navigation */
h2.slbl,div.slbl{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.09em;padding:13px 16px 7px;margin:0;display:block;border:none;background:none;width:100%;text-align:left;}
.es{text-align:center;padding:48px 20px;color:var(--tx3)}
.esi{font-size:44px;margin-bottom:10px}
.esl{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:4px}
.fu{animation:fu .26s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tdt{width:6px;height:6px;border-radius:50%;background:var(--tx3);animation:bc 1.2s ease-in-out infinite}
@keyframes bc{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
/* Poll */
.po{background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:11px 12px;margin-bottom:7px;cursor:pointer;position:relative;overflow:hidden}
.po.vt{border-color:var(--ac);cursor:default}
.pb{position:absolute;left:0;top:0;bottom:0;background:rgba(147,51,234,.13);transition:width .6s ease}
.pc{position:relative;display:flex;justify-content:space-between;align-items:center}
/* Trending */
.trtg{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--bd)}
.trtg:active{background:rgba(255,255,255,.02)}
/* Quotes */
.qbub{margin:0 0 10px;border:1px solid var(--bd2);border-radius:10px;padding:10px 12px;background:var(--sf2)}
.qbub-head{display:flex;align-items:center;gap:6px;margin-bottom:4px}
/* Embeds */
.embed{margin:0 0 10px;border:1px solid var(--bd2);border-radius:10px;overflow:hidden}
.embed-thumb{width:100%;aspect-ratio:16/9;max-height:160px;background:linear-gradient(135deg,#0a0818,#1a0a2e);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.embed-play{width:44px;height:44px;background:rgba(255,0,0,.9);border-radius:10px;display:flex;align-items:center;justify-content:center;position:absolute}
.embed-bar{background:#181818;padding:8px 10px 6px}
.embed-prog{width:100%;height:3px;background:#333;border-radius:2px;cursor:pointer;margin-bottom:7px}

/* --- DRAFTS --------------------------------------------------------------- */
const DRAFTS_KEY = "dbm_drafts";
function getDrafts() { try { return JSON.parse(localStorage.getItem(DRAFTS_KEY) || "[]"); } catch (e5) { return []; } }
function saveDraftItem(draft) {
  try {
    const drafts = getDrafts().filter(d => d.id !== draft.id);
    drafts.unshift(draft);
    localStorage.setItem(DRAFTS_KEY, JSON.stringify(drafts.slice(0,20)));
  } catch (e6) {}
}
function deleteDraftItem(id) {
  try { localStorage.setItem(DRAFTS_KEY, JSON.stringify(getDrafts().filter(d => d.id !== id))); } catch (e7) {}
}

/* --- THEME ---------------------------------------------------------------- */
const THEME_KEY = "dbm_theme";
function getSavedTheme() { try { return localStorage.getItem(THEME_KEY); } catch (e8) { return null; } }
function saveTheme(t) { try { localStorage.setItem(THEME_KEY, t); } catch (e9) {} }
function applyTheme(theme) {
  const root = document.documentElement;
  if (theme === "light") {
    const vars = {"--bg":"#f5f5f7","--sf":"#ffffff","--sf2":"#f0f0f5","--sf3":"#e5e5ea",
      "--bd":"#d1d1d6","--bd2":"#c7c7cc","--tx":"#1c1c1e","--tx2":"#3a3a3c","--tx3":"#8e8e93"};
    Object.entries(vars).forEach(([k,v]) => root.style.setProperty(k, v));
  } else {
    ["--bg","--sf","--sf2","--sf3","--bd","--bd2","--tx","--tx2","--tx3"].forEach(k => root.style.removeProperty(k));

}

/* --- DAILY DIGEST --------------------------------------------------------- */
const DIGEST_KEY = "dbm_last_digest";
const ONBOARDING_KEY = "dbm_onboarding_seen";
function getOnboardingSeen() { try { return localStorage.getItem(ONBOARDING_KEY) === "true"; } catch (e10) { return false; } }
function setOnboardingSeen() { try { localStorage.setItem(ONBOARDING_KEY, "true"); } catch (e11) {} }
function resetOnboarding() { try { localStorage.removeItem(ONBOARDING_KEY); } catch (e12) {} }
function shouldShowDigest() {
  try {
    const last = localStorage.getItem(DIGEST_KEY);
    if (!last) return true;
    const diff = Date.now() - parseInt(last);
    return diff > 20 * 60 * 60 * 1000; // 20 hours
  } catch (e13) { return false; }
}

const fmt = n => n == null ? "0" : Number(n).toLocaleString();

function getLinkInfo(text) {
  if (/youtube\.com/i.test(text)) return {type:"youtube",domain:"youtube.com"};
  const m = text.match(/([a-zA-Z0-9-]+\.(io|dream|com|org|net|app))/);
  if (m) return {type:"site",domain:m[0].replace(/^www\./,"")};
  return null;
}

function useDreams(init) {
  const [dreams, setDreams] = useState(init);
  const tl = id => setDreams(ds => ds.map(d => d.id===id ? {...d, liked:!d.liked, likes:d.liked?d.likes-1:d.likes+1} : d));
  const tr = id => setDreams(ds => ds.map(d => d.id===id ? {...d, redreamed:true, redreams:d.redreams+1} : d));
  const tur = id => setDreams(ds => ds.map(d => d.id===id ? {...d, redreamed:false, redreams:Math.max(0,d.redreams-1)} : d));
  const tq = id => setDreams(ds => ds.map(d => d.id===id ? {...d, quoted:true, quotes:(d.quotes||0)+1} : d));
  const tuq = id => setDreams(ds => ds.map(d => d.id===id ? {...d, quoted:false, quotes:Math.max(0,(d.quotes||1)-1)} : d));
  const tb = id => setDreams(ds => ds.map(d => d.id===id ? {...d, bookmarked:!d.bookmarked} : d));
  // Increment comment count when a comment is posted - keeps feed count in sync
  const tc = id => setDreams(ds => ds.map(d => d.id===id ? {...d, comments:d.comments+1} : d));
  return {dreams, setDreams, tl, tr, tur, tq, tuq, tb, tc};
}

/* --- DREAM TEXT RENDERER — handles newlines and hashtags ----------------- */
function DreamText({text, style}) {
  // Split on \n to get paragraphs, then within each line find hashtags
  const paras = (text || "").split("\n");
  const children = [];
  paras.forEach((para, pi) => {
    if (pi > 0) children.push(React.createElement('br', {key:"b"+pi}));
    // split on word boundaries around hashtags
    const parts = para.split(/(#\w+)/g);
    parts.forEach((part, i) => {
      if (!part) return;
      if (part.startsWith('#')) {
        children.push(React.createElement('span', {key:pi+"_"+i, className:"dc-tag"}, part));
      } else {
        children.push(part);
      }
    });
  });
  return React.createElement('span', {style: Object.assign({whiteSpace:"pre-wrap"}, style||{})}, children);
}
